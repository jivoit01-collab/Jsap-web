name: JSAP Web - Build & Deploy

on:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "8.0.x"
  APP_NAME: "JSAP"
  PUBLISH_PATH: publish
  # Set your IIS site deployment path on the Windows server
  DEPLOY_PATH: D:\LiveProject\JSAP
  IIS_SITE_NAME: "JSAP"

jobs:
  build-and-deploy:
    runs-on: self-hosted  # Your Windows server with GitHub Actions runner installed

    steps:
      # Step 1: Checkout the latest code from main branch
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup .NET SDK matching your project's target framework
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Step 3: Restore NuGet packages
      - name: Restore Dependencies
        run: dotnet restore JSAPNEW.sln

      - name: Clean
        run: dotnet clean JSAPNEW.sln
      # Step 4: Build the project in Release mode
      - name: Build
        run: dotnet build JSAPNEW.sln --configuration Release --no-restore

      # Step 5: Publish the app to a folder
      - name: Publish
        run: dotnet publish JSAPNEW.csproj -c Release -o ${{ env.PUBLISH_PATH }} --no-build

      # Step 6: Stop IIS site before deploying new files
      - name: Stop IIS Site
        run: |
          Import-Module WebAdministration
          if (Get-Website -Name "${{ env.IIS_SITE_NAME }}" -ErrorAction SilentlyContinue) {
            Stop-Website -Name "${{ env.IIS_SITE_NAME }}"
            Write-Host "Stopped IIS site: ${{ env.IIS_SITE_NAME }}"
          }
          # Give IIS time to release file locks
          Start-Sleep -Seconds 3
        shell: powershell
      
      # Step 7: Deploy - copy published files to IIS directory
      - name: Deploy to IIS (Filtered Copy)
        run: |
          $source = "${{ env.PUBLISH_PATH }}"
          $destination = "${{ env.DEPLOY_PATH }}"

          # Ensure destination exists
          if (-not (Test-Path $destination)) {
            New-Item -ItemType Directory -Path $destination -Force
          }

          # Files/folders to KEEP (never delete)
            $keep = @(
              "appsettings.json",
              "appsettings.Production.json",
              "web.config",
              "wwwroot",
              "JSAP.bat"
            )

            # Delete everything EXCEPT keep list
            Get-ChildItem -Path $destination -Force | ForEach-Object {
              if ($keep -notcontains $_.Name) {
                try {
                  Remove-Item $_.FullName -Recurse -Force -ErrorAction Stop
                  Write-Host "Deleted: $($_.Name)"
                } catch {
                  Write-Host "Skipped (in use or error): $($_.Name)"
                }
              } else {
                Write-Host "Preserved: $($_.Name)"
              }
            }
          # Copy everything EXCEPT excluded items
          Get-ChildItem -Path $source | ForEach-Object {
            if ($keep -notcontains $_.Name) {
              Copy-Item -Path $_.FullName -Destination $destination -Recurse -Force
            } else {
              Write-Host "Skipped: $($_.Name)"
            }
          }

          Write-Host "Filtered deployment completed."
        shell: powershell

      # Step 8: Start IIS site after deployment
      - name: Start IIS Site
        run: |
          Import-Module WebAdministration
          Start-Website -Name "${{ env.IIS_SITE_NAME }}"
          Write-Host "Started IIS site: ${{ env.IIS_SITE_NAME }}"
        shell: powershell

      # Step 9: Verify the site is running
      - name: Health Check
        run: |
          Start-Sleep -Seconds 10
          try {
            $response = Invoke-WebRequest -Uri "https://dsr.jivocanola.com:5000/" -UseBasicParsing -TimeoutSec 15
            Write-Host "Site is UP - Status: $($response.StatusCode)"
          } catch {
            Write-Host "ERROR: Health check failed - $($_.Exception.Message)"
          exit 1
          }
        shell: powershell
